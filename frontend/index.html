<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTestTool</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css?v=2">
</head>

<body>
    <div class="container">
        <header>
            <h1>AutoTestTool</h1>
            <p>Hệ thống kiểm thử mã nguồn tự động thông minh</p>
        </header>

        <main>
            <div class="upload-section" id="drop-area">
                <input type="file" id="fileElem" accept=".py" style="display:none" multiple>
                <label class="button primary" for="fileElem">Chọn file Python (.py)</label>
                <p id="file-name">Hoặc kéo thả file vào đây</p>
                <ul id="file-list" class="file-list"></ul>
            </div>

            <div class="action-section">
                <button id="submit-btn" class="button magic" disabled>Bắt Đầu Kiểm Thử ✨</button>
            </div>

            <div id="loader" class="loader hidden">
                <div class="spinner"></div>
                <p id="loader-message">Đang xử lý, vui lòng chờ...</p>
                <div class="steps">
                    <span id="step-analyze" class="step pending">Phân tích</span> ➜
                    <span id="step-ai" class="step pending">Sinh Test AI</span> ➜
                    <span id="step-exec" class="step pending">Chạy Test</span>
                </div>
            </div>

            <div id="results" class="results hidden">
                <h2>Kết quả kiểm thử</h2>
                <div id="results-container"></div>
            </div>
        </main>
    </div>
    <script src="/frontend/script.js?v=3"></script>
</body>

</html>
